# Forensiq secrets template
#
# DO NOT commit real values. This file lists every required key with
# placeholder values; populate via your secret manager:
#
#   - AWS Secrets Manager + external-secrets operator
#   - Vault Agent Injector
#   - Sealed Secrets
#   - SOPS-encrypted Kustomize overlays
#
# At minimum, run:
#   kubectl create secret generic forensiq-app -n forensiq \
#     --from-literal=ANTHROPIC_API_KEY=... \
#     --from-literal=DATABASE_URL=postgres://... \
#     --from-literal=SESSION_SECRET=$(openssl rand -hex 32) \
#     --from-literal=GITHUB_APP_PRIVATE_KEY="$(base64 -i app.pem)" \
#     ...
#
# The Deployment references these via envFrom.

apiVersion: v1
kind: Secret
metadata:
  name: forensiq-app
  namespace: forensiq
type: Opaque
stringData:
  # ─── Core ────────────────────────────────────────────────────────
  DATABASE_URL: "postgres://forensiq:CHANGEME@forensiq-postgres:5432/forensiq?sslmode=require"
  REDIS_URL: "redis://forensiq-redis:6379"
  PUBLIC_URL: "https://forensiq.example.com"
  FRONTEND_URL: "https://forensiq.example.com"

  # ─── AI / Source fetchers ────────────────────────────────────────
  ANTHROPIC_API_KEY: ""
  ANTHROPIC_MODEL: "claude-opus-4-7"
  ETHERSCAN_API_KEY: ""
  OKLINK_API_KEY: ""
  BSCSCAN_API_KEY: ""
  POLYGONSCAN_API_KEY: ""
  ARBISCAN_API_KEY: ""
  OPT_ETHERSCAN_API_KEY: ""
  BASESCAN_API_KEY: ""
  GITHUB_TOKEN: ""

  # ─── Auth ────────────────────────────────────────────────────────
  GITHUB_OAUTH_CLIENT_ID: ""
  GITHUB_OAUTH_CLIENT_SECRET: ""
  SESSION_SECRET: ""

  # ─── GitHub App ──────────────────────────────────────────────────
  GITHUB_APP_ID: ""
  GITHUB_APP_PRIVATE_KEY: ""   # base64-encoded PEM
  GITHUB_APP_WEBHOOK_SECRET: ""

  # ─── Notifications ───────────────────────────────────────────────
  SENDGRID_API_KEY: ""
  NOTIFY_FROM_EMAIL: "forensiq@example.com"

  # ─── Runtime ─────────────────────────────────────────────────────
  ENGINE_RUNTIME: "kubernetes"
  K8S_JOB_NAMESPACE: "forensiq"
  K8S_JOB_SERVICE_ACCOUNT: "forensiq-engine-runner"
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  WORKER_CONCURRENCY: "4"
