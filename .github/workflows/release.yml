#
# Production release pipeline. Separate from ci.yml so:
#   - ci.yml stays cheap and runs on every PR
#   - this only fires on version tags (v1.2.3 etc.)
#   - secrets for AWS/EKS live in the "production" environment, gated
#     by GitHub Actions' environment protection rules
#
# Required secrets (in the "production" environment):
#   AWS_ROLE_TO_ASSUME  - IAM role ARN for GitHub OIDC
#   AWS_REGION          - e.g. us-east-1
#   ECR_REPOSITORY      - e.g. forensiq
#   EKS_CLUSTER_NAME    - e.g. forensiq
#   PROD_DATABASE_URL   - from `terraform output -raw database_url`
#   PROD_REDIS_URL      - from `terraform output -raw redis_url`
#   PROD_HOST           - e.g. forensiq.example.com (for smoke test)
#
# OIDC trust setup is documented in infra/README.md.

name: release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  # ───────────────────────────────────────────────────────────────────
  # Validate: run the same tests as CI, but blocking. We don't trust
  # that a tag was pushed off a green main — re-verify.
  # ───────────────────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - working-directory: backend
        run: |
          npm ci
          npx tsc --noEmit
          npm test

  # ───────────────────────────────────────────────────────────────────
  # Build and push the application image to ECR with the tag name as
  # the image tag. ECR tags are immutable so each release maps to one
  # provable digest.
  # ───────────────────────────────────────────────────────────────────
  build-app:
    name: Build app image
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    environment: production
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile.app
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Output image URI (digest-pinned)
        id: image
        run: |
          echo "uri=${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  # ───────────────────────────────────────────────────────────────────
  # Build engine images. These rarely change — only rebuild on release
  # to amortize cost. Pinned to the engine versions in the Dockerfiles.
  # ───────────────────────────────────────────────────────────────────
  build-engines:
    name: Build engines
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    strategy:
      fail-fast: false  # one bad engine shouldn't block the rest
      matrix:
        engine:
          - { name: slither,  version: 0.10.4 }
          - { name: aderyn,   version: 0.5.5  }
          - { name: mythril,  version: 0.24.8 }
          - { name: semgrep,  version: 1.85   }
          - { name: solhint,  version: 5.0.5  }
          - { name: echidna,  version: 2.2.4  }
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: backend/docker
          file: backend/docker/${{ matrix.engine.name }}.Dockerfile
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/forensiq-${{ matrix.engine.name }}:${{ matrix.engine.version }}
          cache-from: type=gha,scope=${{ matrix.engine.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.engine.name }}

  # ───────────────────────────────────────────────────────────────────
  # Roll out to EKS. Uses kustomize to inject the digest-pinned image,
  # waits for rollout, then runs a smoke test before declaring success.
  # ───────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build-app, build-engines]
    timeout-minutes: 15
    environment:
      name: production
      url: https://${{ secrets.PROD_HOST }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Update ConfigMap with runtime values
        env:
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          PROD_REDIS_URL: ${{ secrets.PROD_REDIS_URL }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
          S3_BUCKET: ${{ secrets.PROD_S3_BUCKET }}
        run: |
          # Idempotently update the ConfigMap. Existing keys we don't list
          # are preserved by --dry-run + apply with --from-literal merging.
          kubectl -n forensiq create configmap forensiq-config \
            --from-literal=NODE_ENV=production \
            --from-literal=PORT=3000 \
            --from-literal=WORKER_CONCURRENCY=8 \
            --from-literal=ANTHROPIC_MODEL=claude-opus-4-7 \
            --from-literal=PUBLIC_URL="https://${PROD_HOST}" \
            --from-literal=FRONTEND_URL="https://${PROD_HOST}" \
            --from-literal=DATABASE_URL="${PROD_DATABASE_URL}" \
            --from-literal=REDIS_URL="${PROD_REDIS_URL}" \
            --from-literal=S3_REPORTS_BUCKET="${S3_BUCKET}" \
            --from-literal=AWS_REGION="${{ secrets.AWS_REGION }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply base manifests
        run: kubectl apply -f infra/k8s/

      - name: Set image digest on Deployments
        run: |
          # The build job produced an immutable, digest-pinned image URI.
          # Pin both api and worker to that exact digest.
          IMAGE="${{ needs.build-app.outputs.image_uri }}"
          kubectl -n forensiq set image deployment/forensiq-api    api=$IMAGE
          kubectl -n forensiq set image deployment/forensiq-worker worker=$IMAGE

      - name: Wait for rollout
        run: |
          kubectl -n forensiq rollout status deployment/forensiq-api    --timeout=5m
          kubectl -n forensiq rollout status deployment/forensiq-worker --timeout=10m

      - name: Smoke test
        run: |
          for i in {1..30}; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "https://${{ secrets.PROD_HOST }}/api/health")
            if [[ "$code" == "200" ]]; then
              echo "✓ Health check passed (HTTP $code)"
              exit 0
            fi
            echo "Attempt $i: HTTP $code, retrying..."
            sleep 5
          done
          echo "✗ Health check did not return 200 within 150s after rollout"
          # Pull recent logs to help post-mortem
          kubectl -n forensiq logs -l app=forensiq-api --tail=100 || true
          exit 1

      - name: Slack notification (success)
        if: success() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.RELEASE_SLACK_WEBHOOK }}
        run: |
          curl -sX POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' -d @- <<EOF
          { "text": "🚀 Forensiq ${{ github.ref_name }} deployed to production" }
          EOF

      - name: Slack notification (failure)
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.RELEASE_SLACK_WEBHOOK }}
        run: |
          curl -sX POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' -d @- <<EOF
          { "text": "💥 Forensiq ${{ github.ref_name }} deploy FAILED. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" }
          EOF
