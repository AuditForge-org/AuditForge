name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend: tests + typecheck ───────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install
        working-directory: backend
        run: npm ci

      - name: Typecheck
        working-directory: backend
        run: npx tsc --noEmit

      - name: Test
        working-directory: backend
        run: npm test

  # ─── Frontend: syntax check ───────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Syntax check
        working-directory: frontend
        run: |
          for f in api.js views.js app.js; do
            node --check "$f"
          done

  # ─── Build + push images (only on main) ────────────────────────────
  build:
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # for OIDC if pushing to ECR with assumed roles
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          short=$(git rev-parse --short HEAD)
          echo "image=ghcr.io/${{ github.repository_owner }}/forensiq" >> $GITHUB_OUTPUT
          echo "sha=$short" >> $GITHUB_OUTPUT

      - name: Build + push app image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile.app
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Provenance attestation — supply-chain hygiene
          provenance: true
          sbom: true

      # Engine images: build once and push to a registry your engine Jobs can pull from.
      # In production, pre-build these via a separate workflow and pin the digests in the worker config.
      - name: Build slither image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/docker/slither.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image }}-slither:0.10.4
          cache-from: type=gha,scope=slither
          cache-to: type=gha,mode=max,scope=slither

      # Repeat for aderyn, mythril, semgrep, solhint, echidna...
      # Omitted here for brevity; same pattern.

      # Vulnerability scan the freshly built image
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: 'CRITICAL,HIGH'
          exit-code: '0'   # don't fail the build, just report

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

